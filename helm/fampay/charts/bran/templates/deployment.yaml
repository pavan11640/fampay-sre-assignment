apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-bran
  namespace: {{ .Values.global.namespace }}
  labels:
    app: bran
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: bran
  template:
    metadata:
      labels:
        app: bran
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: bran
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-bran-config
            - secretRef:
                name: {{ .Release.Name }}-bran-secrets
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /bran/
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /bran/
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
