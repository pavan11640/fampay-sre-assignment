global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert-rules.yaml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "hodr"
    metrics_path: /metrics
    static_configs:
      - targets: ["hodr:8888"]
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["fampay"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: hodr
        action: keep

  - job_name: "bran"
    metrics_path: /metrics
    static_configs:
      - targets: ["bran:8000"]
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["fampay"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: bran
        action: keep

  - job_name: "nginx-ingress"
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["ingress-nginx"]
