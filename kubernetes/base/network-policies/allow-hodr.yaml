apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hodr-ingress
  namespace: fampay
spec:
  podSelector:
    matchLabels:
      app: hodr
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8888
    # Allow from bran
    - from:
        - podSelector:
            matchLabels:
              app: bran
      ports:
        - port: 8888
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
